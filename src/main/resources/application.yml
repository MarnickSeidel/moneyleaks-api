spring:
  application:
    name: moneyleaks-api
  datasource:
    url: jdbc:postgresql://localhost:5434/moneyleaks
    username: moneyleaks
    password: moneyleaks
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

moneyleaks:
  recurring:
    min-occurrences: 2
    amount-tolerance-percent: 5
    monthly-min-days: 26
    monthly-max-days: 35
    yearly-min-days: 350
    yearly-max-days: 380

# Open Banking provider: GoCardless Bank Account Data API (formerly Nordigen).
# Leave secret-id / secret-key blank until you have credentials; supply them via
# environment variables (GOCARDLESS_SECRET_ID / GOCARDLESS_SECRET_KEY) in real
# environments and never commit real values.
gocardless:
  api-url: https://bankaccountdata.gocardless.com/api/v2
  secret-id: ${GOCARDLESS_SECRET_ID:}
  secret-key: ${GOCARDLESS_SECRET_KEY:}
  redirect-url: ${GOCARDLESS_REDIRECT_URL:http://localhost:8080/api/bank-connections/callback}
  # While no credentials are configured, serve deterministic sample data so the
  # connection/sync endpoints and detection pipeline can be exercised locally.
  # MUST be false in production.
  sample-data-enabled: true

# Open Banking provider: Enable Banking (https://enablebanking.com). This is the default
# provider (GoCardless does not onboard new individuals). Authentication uses an RS256 JWT
# signed with the RSA private key of a registered Application; the JWT 'kid' is the
# Application ID. Register the app + upload a self-signed certificate in the Enable Banking
# control panel, then supply the values below via environment variables. Never commit the
# Application ID, the private key file, or the key contents.
enablebanking:
  api-url: https://api.enablebanking.com
  application-id: ${ENABLE_BANKING_APP_ID:}
  # Path to the PKCS#8 PEM private key matching the uploaded certificate (keep it out of git),
  # or supply the PEM contents inline via ENABLE_BANKING_PRIVATE_KEY.
  private-key-path: ${ENABLE_BANKING_PRIVATE_KEY_PATH:}
  private-key-pem: ${ENABLE_BANKING_PRIVATE_KEY:}
  redirect-url: ${ENABLE_BANKING_REDIRECT_URL:http://localhost:8080/api/bank-connections/callback}
  country: ${ENABLE_BANKING_COUNTRY:NL}
  consent-valid-days: 90
  psu-type: personal
  jwt-ttl-seconds: 3600
  # Serve deterministic sample data until real credentials are configured. MUST be false in production.
  sample-data-enabled: true
