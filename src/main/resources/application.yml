spring:
  application:
    name: moneyleaks-api
  datasource:
    url: jdbc:postgresql://localhost:5434/moneyleaks
    username: moneyleaks
    password: moneyleaks
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

moneyleaks:
  recurring:
    min-occurrences: 2
    amount-tolerance-percent: 5
    monthly-min-days: 26
    monthly-max-days: 35
    yearly-min-days: 350
    yearly-max-days: 380

# Open Banking provider: GoCardless Bank Account Data API (formerly Nordigen).
# Leave secret-id / secret-key blank until you have credentials; supply them via
# environment variables (GOCARDLESS_SECRET_ID / GOCARDLESS_SECRET_KEY) in real
# environments and never commit real values.
gocardless:
  api-url: https://bankaccountdata.gocardless.com/api/v2
  secret-id: ${GOCARDLESS_SECRET_ID:}
  secret-key: ${GOCARDLESS_SECRET_KEY:}
  redirect-url: ${GOCARDLESS_REDIRECT_URL:http://localhost:8080/api/bank-connections/callback}
  # While no credentials are configured, serve deterministic sample data so the
  # connection/sync endpoints and detection pipeline can be exercised locally.
  # MUST be false in production.
  sample-data-enabled: true
