services:
  postgres:
    image: postgres:16-alpine
    container_name: moneyleaks-postgres
    environment:
      POSTGRES_DB: moneyleaks
      POSTGRES_USER: moneyleaks
      POSTGRES_PASSWORD: moneyleaks
    ports:
      - "5434:5432"
    volumes:
      - moneyleaks_pg_data:/var/lib/postgresql/data

volumes:
  moneyleaks_pg_data:
